        <h1>MES API · Sistema MES orientado a eventos</h1>
        <p>TFG Ingeniería del Software · UOC · Óscar Gutiérrez González</p>

    <script src="https://cdn.jsdelivr.net/npm/redoc@2.1.3/bundles/redoc.standalone.js"></script>
    <script>
      const specYaml = "openapi: 3.0.3\ninfo:\n  title: MES API\n  description: |\n    API REST del sistema MES basado en arquitectura orientada a eventos.\n    Dise\u00f1ado para la gesti\u00f3n de l\u00edneas de producci\u00f3n SMT en entornos industriales de bajo coste.\n    \n    **TFG \u2014 Ingenier\u00eda del Software \u00b7 UOC**  \n    Autor: \u00d3scar Guti\u00e9rrez Gonz\u00e1lez  \n    \n    Todos los endpoints requieren autenticaci\u00f3n mediante token JWT en la cabecera \n    `Authorization: Bearer {token}`, excepto `/auth/login`.\n    \n    El token JWT es generado y firmado por la propia MES API tras verificar las \n    credenciales del usuario contra la base de datos. En peticiones posteriores, \n    la API valida la firma del token criptogr\u00e1ficamente sin consultar la base de datos.\n  version: 1.0.0\n  contact:\n    name: \u00d3scar Guti\u00e9rrez Gonz\u00e1lez\n\nservers:\n  - url: https://mes-api.empresa.local/api/v1\n    description: Servidor MES (red local industrial)\n\ntags:\n  - name: Autenticaci\u00f3n\n    description: Gesti\u00f3n de sesiones y tokens JWT\n  - name: \u00d3rdenes de fabricaci\u00f3n\n    description: Creaci\u00f3n, consulta y gesti\u00f3n del ciclo de vida de las OFs\n  - name: Trazabilidad y producci\u00f3n\n    description: Check-in, checkout e historial de piezas\n  - name: Piezas\n    description: Gesti\u00f3n de piezas \u2014 scrap y reparaciones\n  - name: Stock\n    description: Estado WIP/MAMA de piezas en tiempo real\n  - name: Paradas\n    description: Registro y gesti\u00f3n de paradas de producci\u00f3n\n  - name: OEE e informes\n    description: Indicadores de eficiencia y informes de producci\u00f3n\n  - name: Recetas\n    description: Gesti\u00f3n de recetas de fabricaci\u00f3n por producto y estaci\u00f3n\n  - name: Usuarios y roles\n    description: Gesti\u00f3n de usuarios, roles y permisos\n  - name: Integraci\u00f3n ERP\n    description: Endpoints de integraci\u00f3n bidireccional con el ERP\n\npaths:\n\n  # \u2500\u2500\u2500 AUTENTICACI\u00d3N \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  /auth/login:\n    post:\n      tags: [Autenticaci\u00f3n]\n      summary: Iniciar sesi\u00f3n\n      description: |\n        Verifica las credenciales del usuario contra la base de datos.\n        Si son correctas, la MES API genera y firma un token JWT con la clave\n        secreta del servidor y lo devuelve al cliente.\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required: [login, password]\n              properties:\n                login:\n                  type: string\n                  example: operario01\n                password:\n                  type: string\n                  example: \"********\"\n      responses:\n        '200':\n          description: Login correcto\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  token:\n                    type: string\n                    description: Token JWT firmado por la MES API\n                  expiracion:\n                    type: string\n                    format: date-time\n                  usuario:\n                    $ref: '#/components/schemas/Usuario'\n        '401':\n          $ref: '#/components/responses/Unauthorized'\n\n  /auth/logout:\n    post:\n      tags: [Autenticaci\u00f3n]\n      summary: Cerrar sesi\u00f3n\n      description: |\n        A\u00f1ade el token activo a la lista negra del servidor.\n        Cualquier petici\u00f3n posterior con ese token ser\u00e1 rechazada aunque no haya expirado.\n      security: [{ bearerAuth: [] }]\n      responses:\n        '204':\n          description: Sesi\u00f3n cerrada correctamente\n\n  /auth/refresh:\n    post:\n      tags: [Autenticaci\u00f3n]\n      summary: Renovar token JWT\n      description: |\n        Genera un nuevo token JWT con una nueva fecha de expiraci\u00f3n.\n        El token anterior queda invalidado.\n      security: [{ bearerAuth: [] }]\n      responses:\n        '200':\n          description: Nuevo token generado\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  token:\n                    type: string\n                  expiracion:\n                    type: string\n                    format: date-time\n\n  # \u2500\u2500\u2500 \u00d3RDENES DE FABRICACI\u00d3N \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  /ordenes:\n    get:\n      tags: [\u00d3rdenes de fabricaci\u00f3n]\n      summary: Listar \u00f3rdenes de fabricaci\u00f3n\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: estado\n          in: query\n          schema:\n            type: string\n            enum: [PENDIENTE, EN_PRODUCCION, FINALIZADA]\n        - name: producto_id\n          in: query\n          schema:\n            type: integer\n      responses:\n        '200':\n          description: Lista de \u00f3rdenes\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/OrdenFabricacion'\n    post:\n      tags: [\u00d3rdenes de fabricaci\u00f3n]\n      summary: Crear orden de fabricaci\u00f3n\n      description: |\n        Crea una nueva OF. El campo `origen` indica si la orden viene del ERP o\n        ha sido creada directamente en el MES. Cuando el origen es ERP, SAP env\u00eda\n        el payload completo con operaciones y BOM y la API responde con el c\u00f3digo\n        correspondiente indicando si la orden se ha podido registrar correctamente.\n      security: [{ bearerAuth: [] }]\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/OrdenFabricacionInput'\n      responses:\n        '201':\n          description: Orden creada correctamente\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  id:\n                    type: integer\n                  nombre:\n                    type: string\n                    example: OF-005\n        '400':\n          $ref: '#/components/responses/BadRequest'\n        '409':\n          $ref: '#/components/responses/Conflict'\n\n  /ordenes/{nombre}:\n    get:\n      tags: [\u00d3rdenes de fabricaci\u00f3n]\n      summary: Detalle de una orden\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/nombre'\n      responses:\n        '200':\n          description: Detalle de la orden con operaciones y BOM\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/OrdenFabricacion'\n        '404':\n          $ref: '#/components/responses/NotFound'\n\n  /ordenes/{nombre}/iniciar:\n    put:\n      tags: [\u00d3rdenes de fabricaci\u00f3n]\n      summary: Iniciar orden de fabricaci\u00f3n\n      description: Cambia el estado a EN_PRODUCCION y env\u00eda recetas a las estaciones.\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/nombre'\n      responses:\n        '200':\n          description: Orden iniciada correctamente\n        '409':\n          $ref: '#/components/responses/Conflict'\n\n  /ordenes/{nombre}/finalizar:\n    put:\n      tags: [\u00d3rdenes de fabricaci\u00f3n]\n      summary: Finalizar orden de fabricaci\u00f3n\n      description: Cierra la orden bloqueando la asociaci\u00f3n de nuevas piezas.\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/nombre'\n      responses:\n        '200':\n          description: Orden finalizada correctamente\n        '409':\n          $ref: '#/components/responses/Conflict'\n\n  /ordenes/{nombre}/piezas:\n    get:\n      tags: [\u00d3rdenes de fabricaci\u00f3n]\n      summary: Piezas de una orden\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/nombre'\n      responses:\n        '200':\n          description: Lista de piezas con su estado actual\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Pieza'\n\n  # \u2500\u2500\u2500 TRAZABILIDAD Y PRODUCCI\u00d3N \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  /trazabilidad/checkin:\n    post:\n      tags: [Trazabilidad y producci\u00f3n]\n      summary: Registrar check-in de pieza\n      description: |\n        Registra la entrada de una pieza en una estaci\u00f3n tras validar el interlocking.\n        Consumido internamente por la MES API al recibir el mensaje MQTT del broker.\n      security: [{ bearerAuth: [] }]\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required: [serial, estacion_id, orden_nombre]\n              properties:\n                serial:\n                  type: string\n                  example: PCB-001-A\n                estacion_id:\n                  type: integer\n                  example: 3\n                orden_nombre:\n                  type: string\n                  example: OF-001\n      responses:\n        '201':\n          description: Check-in registrado correctamente\n        '409':\n          description: Interlocking activo \u2014 pieza bloqueada\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Error'\n\n  /trazabilidad/checkout:\n    post:\n      tags: [Trazabilidad y producci\u00f3n]\n      summary: Registrar checkout de pieza\n      description: |\n        Registra la salida de una pieza con su resultado y datos de test.\n        \n        Si el resultado es OK y la operaci\u00f3n es la \u00faltima de la ruta, la MES API\n        transiciona autom\u00e1ticamente la pieza al estado MAMA sin intervenci\u00f3n manual:\n        - Si es Cara A (CA): pieza pasa a MAMA como SEMI, disponible para proceso de Cara B.\n        - Si es Cara B (CB): pieza pasa a MAMA como FINISHED, producto terminado.\n        \n        En ambos casos la API genera autom\u00e1ticamente una notificaci\u00f3n al ERP con\n        los consumos de BOM asociados.\n      security: [{ bearerAuth: [] }]\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required: [serial, estacion_id, resultado]\n              properties:\n                serial:\n                  type: string\n                  example: PCB-001-A\n                estacion_id:\n                  type: integer\n                  example: 3\n                resultado:\n                  type: string\n                  enum: [OK, NOK]\n                datos:\n                  type: object\n                  description: Datos de medici\u00f3n espec\u00edficos de la estaci\u00f3n\n                  example:\n                    espesor_um: 182\n                    volumen_pct: 94\n                    area_pct: 97\n      responses:\n        '201':\n          description: Checkout registrado correctamente\n        '400':\n          $ref: '#/components/responses/BadRequest'\n\n  /trazabilidad/{serial}:\n    get:\n      tags: [Trazabilidad y producci\u00f3n]\n      summary: Historial completo de una pieza\n      description: |\n        Devuelve el historial completo de la pieza incluyendo todos los pasos\n        por estaciones, resultados, datos de test y reparaciones.\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: serial\n          in: path\n          required: true\n          schema:\n            type: string\n          example: PCB-001-A\n      responses:\n        '200':\n          description: Historial completo de la pieza\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Trazabilidad'\n        '404':\n          $ref: '#/components/responses/NotFound'\n\n  /trazabilidad/{serial}/estado:\n    get:\n      tags: [Trazabilidad y producci\u00f3n]\n      summary: Estado actual de una pieza\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: serial\n          in: path\n          required: true\n          schema:\n            type: string\n      responses:\n        '200':\n          description: Estado actual de la pieza\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  serial:\n                    type: string\n                  estado:\n                    type: string\n                    enum: [WIP, MAMA, BLOQUEADA, CONSUMIDO, SCRAP]\n                  proxima_operacion:\n                    type: string\n\n  # \u2500\u2500\u2500 PIEZAS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  /piezas/{serial}/scrap:\n    post:\n      tags: [Piezas]\n      summary: Declarar pieza como scrap\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: serial\n          in: path\n          required: true\n          schema:\n            type: string\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required: [motivo]\n              properties:\n                motivo:\n                  type: string\n                  example: Defecto irreparable en AOI\n      responses:\n        '200':\n          description: Pieza declarada scrap correctamente\n        '404':\n          $ref: '#/components/responses/NotFound'\n\n  /piezas/{serial}/reparacion:\n    post:\n      tags: [Piezas]\n      summary: Registrar reparaci\u00f3n de pieza\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: serial\n          in: path\n          required: true\n          schema:\n            type: string\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required: [tipo, resultado]\n              properties:\n                tipo:\n                  type: string\n                  example: Correcci\u00f3n pasta soldadura\n                descripcion:\n                  type: string\n                resultado:\n                  type: string\n                  enum: [OK, NOK]\n      responses:\n        '201':\n          description: Reparaci\u00f3n registrada correctamente\n\n  # \u2500\u2500\u2500 STOCK \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  /stock:\n    get:\n      tags: [Stock]\n      summary: Estado WIP/MAMA de todas las piezas\n      security: [{ bearerAuth: [] }]\n      responses:\n        '200':\n          description: Estado de stock en tiempo real\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  wip:\n                    type: array\n                    items:\n                      $ref: '#/components/schemas/Pieza'\n                  mama:\n                    type: array\n                    items:\n                      $ref: '#/components/schemas/Pieza'\n                  bloqueadas:\n                    type: array\n                    items:\n                      $ref: '#/components/schemas/Pieza'\n                  scrap:\n                    type: array\n                    items:\n                      $ref: '#/components/schemas/Pieza'\n\n  /stock/mama/disponibles/{producto_base}:\n    get:\n      tags: [Stock]\n      summary: SEMIs de Cara A disponibles para Cara B\n      description: Lista los semiacabados de Cara A disponibles para iniciar proceso de Cara B.\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: producto_base\n          in: path\n          required: true\n          schema:\n            type: string\n          example: PROD-001\n      responses:\n        '200':\n          description: Lista de SEMIs disponibles\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Pieza'\n\n  # \u2500\u2500\u2500 PARADAS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  /paradas:\n    get:\n      tags: [Paradas]\n      summary: Listar paradas\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: orden_nombre\n          in: query\n          schema:\n            type: string\n          example: OF-001\n        - name: activas\n          in: query\n          schema:\n            type: boolean\n      responses:\n        '200':\n          description: Lista de paradas\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Parada'\n    post:\n      tags: [Paradas]\n      summary: Registrar parada de producci\u00f3n\n      security: [{ bearerAuth: [] }]\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              type: object\n              required: [orden_nombre, motivo]\n              properties:\n                orden_nombre:\n                  type: string\n                  example: OF-001\n                estacion_id:\n                  type: integer\n                motivo:\n                  type: string\n                  example: Aver\u00eda de m\u00e1quina\n      responses:\n        '201':\n          description: Parada registrada correctamente\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Parada'\n\n  /paradas/{id}/finalizar:\n    put:\n      tags: [Paradas]\n      summary: Finalizar parada activa\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/id'\n      responses:\n        '200':\n          description: Parada cerrada con duraci\u00f3n calculada\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Parada'\n\n  # \u2500\u2500\u2500 OEE E INFORMES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  /oee:\n    get:\n      tags: [OEE e informes]\n      summary: OEE de un periodo\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: fecha_desde\n          in: query\n          required: true\n          schema:\n            type: string\n            format: date-time\n          example: \"2026-05-01T06:00:00\"\n        - name: fecha_hasta\n          in: query\n          required: true\n          schema:\n            type: string\n            format: date-time\n          example: \"2026-05-01T14:00:00\"\n      responses:\n        '200':\n          description: Indicadores OEE calculados para el periodo\n          content:\n            application/json:\n              schema:\n                type: object\n                properties:\n                  disponibilidad:\n                    type: number\n                    example: 91.5\n                  rendimiento:\n                    type: number\n                    example: 87.3\n                  calidad:\n                    type: number\n                    example: 98.2\n                  oee:\n                    type: number\n                    example: 78.4\n                  tiempo_planificado_min:\n                    type: integer\n                    example: 480\n                  tiempo_paradas_min:\n                    type: integer\n                    example: 41\n\n  /informes/produccion:\n    get:\n      tags: [OEE e informes]\n      summary: Informe de producci\u00f3n\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: fecha_desde\n          in: query\n          required: true\n          schema:\n            type: string\n            format: date\n          example: \"2026-05-01\"\n        - name: fecha_hasta\n          in: query\n          required: true\n          schema:\n            type: string\n            format: date\n          example: \"2026-05-31\"\n        - name: orden_nombre\n          in: query\n          schema:\n            type: string\n      responses:\n        '200':\n          description: Informe de producci\u00f3n por OF y periodo\n        '400':\n          $ref: '#/components/responses/BadRequest'\n\n  /informes/calidad:\n    get:\n      tags: [OEE e informes]\n      summary: Informe de calidad y defectos\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: fecha_desde\n          in: query\n          required: true\n          schema:\n            type: string\n            format: date\n          example: \"2026-05-01\"\n        - name: fecha_hasta\n          in: query\n          required: true\n          schema:\n            type: string\n            format: date\n          example: \"2026-05-31\"\n      responses:\n        '200':\n          description: Informe de defectos y scrap por estaci\u00f3n y producto\n        '400':\n          $ref: '#/components/responses/BadRequest'\n\n  # \u2500\u2500\u2500 RECETAS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  /recetas:\n    get:\n      tags: [Recetas]\n      summary: Listar recetas\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - name: producto_id\n          in: query\n          schema:\n            type: integer\n        - name: estacion_id\n          in: query\n          schema:\n            type: integer\n      responses:\n        '200':\n          description: Lista de recetas\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Receta'\n    post:\n      tags: [Recetas]\n      summary: Crear receta\n      security: [{ bearerAuth: [] }]\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/RecetaInput'\n      responses:\n        '201':\n          description: Receta creada correctamente\n\n  /recetas/{id}:\n    get:\n      tags: [Recetas]\n      summary: Detalle de una receta\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/id'\n      responses:\n        '200':\n          description: Detalle de la receta con par\u00e1metros\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/Receta'\n    put:\n      tags: [Recetas]\n      summary: Actualizar receta\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/id'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/RecetaInput'\n      responses:\n        '200':\n          description: Receta actualizada correctamente\n    delete:\n      tags: [Recetas]\n      summary: Eliminar receta\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/id'\n      responses:\n        '204':\n          description: Receta eliminada correctamente\n\n  # \u2500\u2500\u2500 USUARIOS Y ROLES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  /usuarios:\n    get:\n      tags: [Usuarios y roles]\n      summary: Listar usuarios\n      security: [{ bearerAuth: [] }]\n      responses:\n        '200':\n          description: Lista de usuarios\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Usuario'\n    post:\n      tags: [Usuarios y roles]\n      summary: Crear usuario\n      security: [{ bearerAuth: [] }]\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/UsuarioInput'\n      responses:\n        '201':\n          description: Usuario creado correctamente\n\n  /usuarios/{id}:\n    put:\n      tags: [Usuarios y roles]\n      summary: Modificar usuario\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/id'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/UsuarioInput'\n      responses:\n        '200':\n          description: Usuario actualizado correctamente\n    delete:\n      tags: [Usuarios y roles]\n      summary: Desactivar usuario\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/id'\n      responses:\n        '204':\n          description: Usuario desactivado correctamente\n\n  /roles:\n    get:\n      tags: [Usuarios y roles]\n      summary: Listar roles\n      security: [{ bearerAuth: [] }]\n      responses:\n        '200':\n          description: Lista de roles con sus permisos\n\n  # \u2500\u2500\u2500 INTEGRACI\u00d3N ERP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  /erp/notificaciones:\n    get:\n      tags: [Integraci\u00f3n ERP]\n      summary: Notificaciones pendientes para ERP\n      description: Lista las notificaciones generadas por el MES pendientes de env\u00edo al ERP.\n      security: [{ bearerAuth: [] }]\n      responses:\n        '200':\n          description: Lista de notificaciones pendientes\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/NotificacionERP'\n\n  /erp/notificaciones/{id}/ack:\n    put:\n      tags: [Integraci\u00f3n ERP]\n      summary: Confirmar recepci\u00f3n de notificaci\u00f3n\n      description: El ERP confirma que ha recibido y procesado la notificaci\u00f3n.\n      security: [{ bearerAuth: [] }]\n      parameters:\n        - $ref: '#/components/parameters/id'\n      responses:\n        '200':\n          description: Confirmaci\u00f3n registrada correctamente\n\n# \u2500\u2500\u2500 COMPONENTES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ncomponents:\n  securitySchemes:\n    bearerAuth:\n      type: http\n      scheme: bearer\n      bearerFormat: JWT\n      description: |\n        Token JWT generado y firmado por la MES API tras verificar las credenciales\n        del usuario. Incluir en la cabecera: Authorization: Bearer {token}\n\n  parameters:\n    id:\n      name: id\n      in: path\n      required: true\n      schema:\n        type: integer\n    nombre:\n      name: nombre\n      in: path\n      required: true\n      description: Identificador de la orden de fabricaci\u00f3n (ej. OF-001)\n      schema:\n        type: string\n      example: OF-001\n\n  responses:\n    BadRequest:\n      description: Datos incorrectos o incompletos\n      content:\n        application/json:\n          schema:\n            $ref: '#/components/schemas/Error'\n    Unauthorized:\n      description: Token JWT no v\u00e1lido o expirado\n      content:\n        application/json:\n          schema:\n            $ref: '#/components/schemas/Error'\n    Forbidden:\n      description: Sin permisos para realizar esta operaci\u00f3n\n      content:\n        application/json:\n          schema:\n            $ref: '#/components/schemas/Error'\n    NotFound:\n      description: Recurso no encontrado\n      content:\n        application/json:\n          schema:\n            $ref: '#/components/schemas/Error'\n    Conflict:\n      description: Conflicto con el estado actual del sistema\n      content:\n        application/json:\n          schema:\n            $ref: '#/components/schemas/Error'\n\n  schemas:\n    Error:\n      type: object\n      properties:\n        codigo:\n          type: integer\n        mensaje:\n          type: string\n        detalle:\n          type: string\n\n    OrdenFabricacion:\n      type: object\n      properties:\n        id:\n          type: integer\n        nombre:\n          type: string\n          description: Identificador \u00fanico de la orden\n          example: OF-001\n        producto_id:\n          type: integer\n        ruta_id:\n          type: integer\n        cantidad_obj:\n          type: integer\n        estado:\n          type: string\n          enum: [PENDIENTE, EN_PRODUCCION, FINALIZADA]\n        origen:\n          type: string\n          enum: [ERP, MES]\n          description: Indica si la orden fue creada desde el ERP o desde el propio MES\n        fecha_inicio:\n          type: string\n          format: date-time\n        fecha_fin:\n          type: string\n          format: date-time\n\n    OrdenFabricacionInput:\n      type: object\n      required: [nombre, producto_id, cantidad_obj, origen]\n      properties:\n        nombre:\n          type: string\n          example: OF-005\n        producto_id:\n          type: integer\n        cantidad_obj:\n          type: integer\n        origen:\n          type: string\n          enum: [ERP, MES]\n        referencia_erp:\n          type: string\n          description: Referencia interna del ERP (solo cuando origen=ERP)\n\n    Pieza:\n      type: object\n      properties:\n        id:\n          type: integer\n        serial:\n          type: string\n          example: PCB-001-A\n        orden_nombre:\n          type: string\n          example: OF-001\n        estado:\n          type: string\n          enum: [WIP, MAMA, BLOQUEADA, CONSUMIDO, SCRAP]\n        fecha_entrada:\n          type: string\n          format: date-time\n\n    Trazabilidad:\n      type: object\n      properties:\n        id:\n          type: integer\n        serial:\n          type: string\n        estacion_id:\n          type: integer\n        estacion_nombre:\n          type: string\n        operacion_nombre:\n          type: string\n        checkin:\n          type: string\n          format: date-time\n        checkout:\n          type: string\n          format: date-time\n        resultado:\n          type: string\n          enum: [OK, NOK]\n        datos:\n          type: object\n          description: Datos de medici\u00f3n espec\u00edficos de la estaci\u00f3n\n\n    Parada:\n      type: object\n      properties:\n        id:\n          type: integer\n        orden_nombre:\n          type: string\n          example: OF-001\n        estacion_id:\n          type: integer\n        motivo:\n          type: string\n        inicio:\n          type: string\n          format: date-time\n        fin:\n          type: string\n          format: date-time\n        duracion_min:\n          type: integer\n\n    Receta:\n      type: object\n      properties:\n        id:\n          type: integer\n        producto_id:\n          type: integer\n        estacion_id:\n          type: integer\n        version:\n          type: string\n        parametros:\n          type: object\n        activa:\n          type: boolean\n\n    RecetaInput:\n      type: object\n      required: [producto_id, estacion_id, version, parametros]\n      properties:\n        producto_id:\n          type: integer\n        estacion_id:\n          type: integer\n        version:\n          type: string\n        parametros:\n          type: object\n\n    NotificacionERP:\n      type: object\n      properties:\n        id:\n          type: integer\n        tipo:\n          type: string\n          enum: [PIEZA_OK, SCRAP, OF_FINALIZADA]\n        payload:\n          type: object\n          description: Contenido de la notificaci\u00f3n seg\u00fan su tipo\n          oneOf:\n            - title: PIEZA_OK\n              type: object\n              properties:\n                serial:\n                  type: string\n                  example: PCB-001-A\n                orden:\n                  type: string\n                  example: OF-001\n                consumos_bom:\n                  type: array\n                  description: Consumos completos de la BOM de la orden\n                  items:\n                    $ref: '#/components/schemas/ConsumoNotificacion'\n            - title: SCRAP\n              type: object\n              properties:\n                serial:\n                  type: string\n                  example: PCB-002-A\n                orden:\n                  type: string\n                  example: OF-001\n                punto_fallo:\n                  type: string\n                  description: Estaci\u00f3n donde se produjo el fallo\n                  example: SPI-L1\n                ultima_operacion:\n                  type: string\n                  example: Inspecci\u00f3n pasta\n                consumos_parciales:\n                  type: array\n                  description: Solo los materiales consumidos hasta el punto de fallo\n                  items:\n                    $ref: '#/components/schemas/ConsumoNotificacion'\n            - title: OF_FINALIZADA\n              type: object\n              properties:\n                orden:\n                  type: string\n                  example: OF-001\n                motivo:\n                  type: string\n                  enum: [OBJETIVO_ALCANZADO, CIERRE_MANUAL]\n        timestamp:\n          type: string\n          format: date-time\n        enviada:\n          type: boolean\n        intentos:\n          type: integer\n\n    ConsumoNotificacion:\n      type: object\n      description: Material consumido a notificar al ERP\n      properties:\n        material_ref:\n          type: string\n          description: Referencia del material en el sistema\n          example: MAT-PAS-001\n        descripcion:\n          type: string\n          example: Pasta de soldadura Sn96\n        cantidad:\n          type: number\n          example: 0.48\n        unidad:\n          type: string\n          example: gr\n\n    Usuario:\n      type: object\n      properties:\n        id:\n          type: integer\n        nombre:\n          type: string\n        apellidos:\n          type: string\n        login:\n          type: string\n        rol_id:\n          type: integer\n        activo:\n          type: boolean\n\n    UsuarioInput:\n      type: object\n      required: [nombre, apellidos, login, rol_id]\n      properties:\n        nombre:\n          type: string\n        apellidos:\n          type: string\n        login:\n          type: string\n        password:\n          type: string\n        rol_id:\n          type: integer\n";
      Redoc.init(specYaml, {}, document.getElementById('redoc-container'));
    </script>
